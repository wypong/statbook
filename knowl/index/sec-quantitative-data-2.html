<div class="para">Quantitative data also comes in two common forms. <dfn class="terminology">Discrete data</dfn> arises from counting, so the possible values are usually separate and distinct. <dfn class="terminology">Continuous data</dfn> arises from measuring, so values can vary over an interval and can in principle be made more precise.<div class="autopermalink" data-description="Paragraph"><a href="#sec-quantitative-data-2" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
