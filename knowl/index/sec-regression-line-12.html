<h3 class="heading"><span class="type">Paragraph</span></h3>
<div class="para">Regression is helpful for prediction, but it should be used with care. Predicting for an <span class="process-math">\(x\)</span> value inside the range of the observed data is called <dfn class="terminology">interpolation</dfn>. Predicting far outside the observed range is called <dfn class="terminology">extrapolation</dfn>, and that is usually much less reliable.<div class="autopermalink" data-description="Paragraph"><a href="#sec-regression-line-12" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
